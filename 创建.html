<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>JS练习</title></head>
<body>
<h1>JavaScript基础知识练习</h1>
<p>按F12查看控制台输出</p >
<script>
// 1. 变量与类型
let name = "张三";
let age = 20;
let isStudent = true;
console.log(name, typeof name, age, typeof age, isStudent, typeof isStudent);

// 2. 表达式
let sum = (10 + 5) * 2;
let isAdult = age >= 18;
console.log("表达式结果:", sum, isAdult);

// 3. 流程控制 - if-else
if (age >= 18) {
    console.log("已成年");
} else {
    console.log("未成年");
}

// 4. 流程控制 - for循环
for (let i = 1; i <= 5; i++) {
    console.log("循环:", i);
}

// 5. 函数
function greet(n) {
    return "你好，" + n;
}
console.log(greet("李四"));
</script>
</body>
</html>
